---
- name: Install 'gui' Linux packages
  become: true
  ansible.builtin.package:
    name:
      - bruno
      - calibre
      - dbeaver-ce
      - evince
      - gparted
      - kdocker
      - gnome-software-plugin-flatpak
      - libreoffice
      - peek
      - ristretto             # XFCE image viewer
      - thunar                # XFCE file manager
      - thunar-archive-plugin # Archive support for Thunar
      #- thunar-dropbox-plugin # Dropbox support for Thunar FIXME: Requires the 'contrib' Debian repo
      - webp-pixbuf-loader    # WebP image format support for Ristretto
      - wl-clipboard
      - xclip
      - xfce4-screenshooter
      - xsel


- name: Check if draw.io is already installed
  ansible.builtin.stat:
    path: "{{ ansible_facts['env']['HOME'] }}/.local/bin/drawio"
  register: drawio_app_image
  when: drawio | default(false)

- name: Download the draw.io AppImage
  ansible.builtin.get_url:
    url: "https://github.com/jgraph/drawio-desktop/releases/download/v{{ version }}/drawio-{{ arch }}-{{ version }}.AppImage"
    mode: '0500'
    dest: "{{ ansible_facts['env']['HOME'] }}/.local/bin/drawio"
  when: drawio and not drawio_app_image.stat.exists
